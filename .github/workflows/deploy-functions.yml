name: Deploy Supabase Edge Functions

# Deploys mobile/supabase/functions/* via the official Supabase CLI action.
# Triggers on:
#   - push to main when any function file changes
#   - manual dispatch (Actions tab → "Deploy Supabase Edge Functions" → Run)
#
# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN   — personal access token from
#       https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF    — your project ref (the slug in the dashboard
#       URL, e.g. wihkcmgtzmdupxuyavyr)
#
# After this workflow succeeds you still need to set the function's runtime
# secrets in the Supabase dashboard:
#   Edge Functions → delete-user → Secrets:
#     SUPABASE_URL              = https://<ref>.supabase.co
#     SUPABASE_SERVICE_ROLE_KEY = <service_role from Project Settings → API>

on:
  push:
    branches: [main]
    paths:
      - 'mobile/supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets are set
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set."
            exit 1
          fi
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF repo secret is not set."
            exit 1
          fi

      - name: Deploy delete-user function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: mobile
        run: |
          supabase functions deploy delete-user \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --no-verify-jwt

      - name: Verify deployment via HTTP probe
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Function exists when an unauthenticated POST returns 401
          # ("Missing Authorization header"), not 404.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://${PROJECT_REF}.supabase.co/functions/v1/delete-user")
          echo "delete-user probe status: $STATUS"
          if [ "$STATUS" = "404" ]; then
            echo "::error::Function 404 — deploy did not register."
            exit 1
          fi
