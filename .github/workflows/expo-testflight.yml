name: Expo iOS TestFlight

on:
  workflow_dispatch:
  push:
    tags:
      - "mobile-v*"

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: mobile
    env:
      APP_SCHEME: AscendMonkMode
      BUNDLE_ID: com.ascend.growth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Select latest Xcode
        run: |
          XCODE_APP=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode installation found on this runner."
            ls -1 /Applications | grep "^Xcode" || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild iOS
        run: npx expo prebuild --platform ios --no-install --non-interactive

      - name: Install pods
        run: |
          cd ios
          pod install --repo-update

      - name: Download App Store provisioning profile via ASC API
        working-directory: ${{ github.workspace }}
        run: |
          # Use fastlane sigh (preinstalled on macos-latest) to fetch the latest
          # App Store distribution profile from Apple Developer Portal.
          PROFILE_DIR="$RUNNER_TEMP/profiles"
          mkdir -p "$PROFILE_DIR"

          fastlane sigh download_all \
            --app_identifier "$BUNDLE_ID" \
            --team_id "${{ secrets.APPLE_TEAM_ID }}" \
            --api_key_path "$API_KEY_PATH" \
            --output_path "$PROFILE_DIR" \
            --platform ios \
            --skip_certificate_verification true \
          || fastlane sigh \
            --app_identifier "$BUNDLE_ID" \
            --team_id "${{ secrets.APPLE_TEAM_ID }}" \
            --api_key_path "$API_KEY_PATH" \
            --output_path "$PROFILE_DIR" \
            --filename "AscendMonkMode.mobileprovision" \
            --platform ios \
            --skip_certificate_verification true

          ls -la "$PROFILE_DIR"

          # Find the App Store profile (filename pattern from sigh)
          PROFILE_FILE=$(find "$PROFILE_DIR" -name "*.mobileprovision" | head -n 1)
          if [ -z "$PROFILE_FILE" ]; then
            echo "No provisioning profile downloaded."
            exit 1
          fi
          echo "Found profile: $PROFILE_FILE"

          # Install profile into Xcode's profile directory
          PP_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_FILE" > "$PP_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PP_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PP_PLIST")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_FILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Import iOS distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Write App Store Connect API key file
        working-directory: ${{ github.workspace }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
          cat > "$API_KEY_PATH" <<'EOF'
          ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          EOF
          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Discover scheme + workspace
        run: |
          # Expo prebuild generates ios/<Scheme>.xcworkspace (a directory).
          # Use find with -type d so we don't descend into it.
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "No xcworkspace found in ios/"
            ls ios/
            exit 1
          fi
          # Get absolute path to avoid path issues
          WORKSPACE_ABS=$(cd "$WORKSPACE" && pwd)
          echo "WORKSPACE=$WORKSPACE_ABS" >> "$GITHUB_ENV"

          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"
          echo "Discovered workspace: $WORKSPACE_ABS"
          echo "Discovered scheme: $SCHEME"

      - name: Create export options plist
        working-directory: ${{ github.workspace }}
        run: |
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "EXPORT_OPTIONS_PLIST=$EXPORT_OPTIONS_PLIST" >> "$GITHUB_ENV"

      - name: Archive iOS app
        run: |
          APP_ARCHIVE_PATH="$RUNNER_TEMP/AscendMonkMode.xcarchive"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$APP_ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -sdk iphoneos \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            clean archive
          echo "APP_ARCHIVE_PATH=$APP_ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          APP_EXPORT_PATH="$RUNNER_TEMP/export"
          xcodebuild \
            -exportArchive \
            -archivePath "$APP_ARCHIVE_PATH" \
            -exportPath "$APP_EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          echo "APP_EXPORT_PATH=$APP_EXPORT_PATH" >> "$GITHUB_ENV"

      - name: Locate IPA
        id: ipa
        run: |
          IPA_PATH=$(find "$APP_EXPORT_PATH" -name "*.ipa" -maxdepth 2 | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in $APP_EXPORT_PATH"
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "IPA: $IPA_PATH"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.ipa.outputs.path }}

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
