name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "TestFlight release notes (optional)"
        required: false
        type: string
  push:
    tags:
      - "ios-v*"

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      APP_PROJECT_PATH: ios/App/App.xcodeproj
      APP_SCHEME: App
      VITE_AI_BACKEND_URL: ${{ vars.VITE_AI_BACKEND_URL }}
      VITE_PERSISTENCE_URL: ${{ vars.VITE_PERSISTENCE_URL }}
      VITE_REVENUECAT_IOS_API_KEY: ${{ secrets.VITE_REVENUECAT_IOS_API_KEY }}
      VITE_REVENUECAT_ENTITLEMENT_ID: ${{ vars.VITE_REVENUECAT_ENTITLEMENT_ID }}
      VITE_REVENUECAT_OFFERING_ID: ${{ vars.VITE_REVENUECAT_OFFERING_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate types and tests
        run: |
          npm run lint
          npm run test

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Import iOS distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profile from secret
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PP_PLIST="$RUNNER_TEMP/profile.plist"
          echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 --decode > "$PP_PATH"
          security cms -D -i "$PP_PATH" > "$PP_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PP_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PP_PLIST")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key file
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
          cat > "$API_KEY_PATH" <<'EOF'
          ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          EOF
          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Create export options plist
        run: |
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ vars.IOS_BUNDLE_ID }}</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "EXPORT_OPTIONS_PLIST=$EXPORT_OPTIONS_PLIST" >> "$GITHUB_ENV"

      - name: Archive iOS app
        run: |
          APP_ARCHIVE_PATH="$RUNNER_TEMP/Ascend.xcarchive"
          xcodebuild \
            -project "$APP_PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$APP_ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            clean archive
          echo "APP_ARCHIVE_PATH=$APP_ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export IPA
        run: |
          APP_EXPORT_PATH="$RUNNER_TEMP/export"
          xcodebuild \
            -exportArchive \
            -archivePath "$APP_ARCHIVE_PATH" \
            -exportPath "$APP_EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          echo "APP_EXPORT_PATH=$APP_EXPORT_PATH" >> "$GITHUB_ENV"

      - name: Locate IPA
        id: ipa
        run: |
          IPA_PATH=$(find "$APP_EXPORT_PATH" -name "*.ipa" -maxdepth 2 | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in $APP_EXPORT_PATH"
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "IPA: $IPA_PATH"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.ipa.outputs.path }}

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          release-notes: ${{ github.event.inputs.release_notes || format('Build {0}', github.sha) }}
